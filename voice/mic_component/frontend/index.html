<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  html, body {
    margin:0; padding:0; background:#0B1220; overflow:hidden;
    font-family: 'Inter', sans-serif; display:flex; align-items:center; justify-content:center;
    height:170px;
  }
  .wrap { display:flex; flex-direction:column; align-items:center; }
  .mic-btn-wrap { position:relative; width:96px; height:96px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .ring { position:absolute; border-radius:50%; border:2px solid rgba(59,130,246,0.4); opacity:0; }
  .idle .ring { animation: idle-pulse 2.4s ease-out infinite; }
  @keyframes idle-pulse {
    0% { width:70px; height:70px; opacity:0.5; }
    100% { width:96px; height:96px; opacity:0; }
  }
  .listening .ring { border-color: rgba(239,68,68,0.5); animation: listen-pulse 1.1s ease-out infinite; }
  @keyframes listen-pulse {
    0% { width:70px; height:70px; opacity:0.7; }
    100% { width:120px; height:120px; opacity:0; }
  }
  .listening .ring:nth-child(2) { animation-delay: 0.35s; }
  .listening .ring:nth-child(3) { animation-delay: 0.7s; }
  .idle .ring:nth-child(2) { animation-delay: 0.8s; }
  .idle .ring:nth-child(3) { animation-delay: 1.6s; }

  .mic-core {
    position:relative; z-index:2; width:70px; height:70px; border-radius:50%;
    background: radial-gradient(circle at 35% 30%, #3B82F6, #1d4ed8);
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 4px 18px rgba(59,130,246,0.35);
    transition: background .25s ease, box-shadow .25s ease;
  }
  .listening .mic-core {
    background: radial-gradient(circle at 35% 30%, #F87171, #DC2626);
    box-shadow: 0 4px 22px rgba(239,68,68,0.4);
  }
  .processing .mic-core {
    background: radial-gradient(circle at 35% 30%, #38BDF8, #0284c7);
  }
  .mic-icon { width:26px; height:26px; }

  .spinner {
    width:22px; height:22px; border:3px solid rgba(255,255,255,0.3);
    border-top-color:#fff; border-radius:50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .label {
    margin-top:14px; font-size:12px; font-weight:700; letter-spacing:1.2px;
    color:#60A5FA; text-transform:uppercase; text-align:center;
  }
  .listening .label { color:#FCA5A5; }
  .processing .label { color:#38BDF8; }
  .error-label { margin-top:8px; font-size:11px; color:#FCA5A5; text-align:center; max-width:260px; }
</style>
</head>
<body>
  <div class="wrap idle" id="wrap">
    <div class="mic-btn-wrap" id="micBtn">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="mic-core" id="micCore">
        <svg class="mic-icon" id="micIcon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
          <line x1="12" y1="19" x2="12" y2="23"></line>
          <line x1="8" y1="23" x2="16" y2="23"></line>
        </svg>
        <div class="spinner" id="spinner" style="display:none;"></div>
      </div>
    </div>
    <div class="label" id="label">TAP TO SPEAK</div>
    <div class="error-label" id="errorLabel" style="display:none;"></div>
  </div>

<script>
// ---- Streamlit component messaging protocol (vanilla, no external deps) ----
function sendToStreamlit(type, extra) {
  const payload = Object.assign({ isStreamlitMessage: true, type: type }, extra || {});
  window.parent.postMessage(payload, "*");
}
function setComponentValue(value) {
  sendToStreamlit("streamlit:setComponentValue", { value: value, dataType: "json" });
}
function setFrameHeight() {
  sendToStreamlit("streamlit:setFrameHeight", { height: document.body.scrollHeight || 170 });
}
sendToStreamlit("streamlit:componentReady", { apiVersion: 1 });
setFrameHeight();
window.addEventListener("load", setFrameHeight);

// ---- Mic recording logic ----
const wrap = document.getElementById("wrap");
const micBtn = document.getElementById("micBtn");
const label = document.getElementById("label");
const spinner = document.getElementById("spinner");
const micIcon = document.getElementById("micIcon");
const errorLabel = document.getElementById("errorLabel");

let mediaRecorder, audioChunks, audioContext, analyser, stream;
let hasSpoken = false, silenceStart = null, recordingStart = null, animFrame;
const SILENCE_MS = 1800;
const SPEECH_TIMEOUT_MS = 7000;
const MAX_RECORDING_MS = 30000;

function setState(state) {
  wrap.className = "wrap " + state;
  if (state === "idle") {
    label.textContent = "TAP TO SPEAK";
    spinner.style.display = "none";
    micIcon.style.display = "block";
  } else if (state === "listening") {
    label.textContent = "LISTENING...";
    spinner.style.display = "none";
    micIcon.style.display = "block";
  } else if (state === "processing") {
    label.textContent = "PROCESSING...";
    spinner.style.display = "block";
    micIcon.style.display = "none";
  }
}

function showError(msg) {
  errorLabel.style.display = "block";
  errorLabel.textContent = msg;
  setState("idle");
}

async function startRecording() {
  errorLabel.style.display = "none";
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (err) {
    showError("Microphone access denied. Please allow mic permission and try again.");
    return;
  }

  setState("listening");
  hasSpoken = false;
  silenceStart = null;
  recordingStart = Date.now();

  audioChunks = [];
  mediaRecorder = new MediaRecorder(stream);
  mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
  mediaRecorder.onstop = onRecordingStop;
  mediaRecorder.start();

  audioContext = new (window.AudioContext || window.webkitAudioContext)();
  const source = audioContext.createMediaStreamSource(stream);
  analyser = audioContext.createAnalyser();
  analyser.fftSize = 2048;
  source.connect(analyser);

  monitorSilence();
}

function monitorSilence() {
  const data = new Uint8Array(analyser.fftSize);
  analyser.getByteTimeDomainData(data);
  let sumDeviation = 0;
  for (let i = 0; i < data.length; i++) {
    sumDeviation += Math.abs(data[i] - 128);
  }
  const avgDeviation = sumDeviation / data.length;
  const now = Date.now();
  const elapsed = now - recordingStart;

  if (avgDeviation > 4) {
    hasSpoken = true;
    silenceStart = null;
  } else if (hasSpoken) {
    if (silenceStart === null) silenceStart = now;
    if (now - silenceStart > SILENCE_MS) {
      stopRecording();
      return;
    }
  }

  if (!hasSpoken && elapsed > SPEECH_TIMEOUT_MS) {
    stopRecording();
    return;
  }
  if (elapsed > MAX_RECORDING_MS) {
    stopRecording();
    return;
  }

  animFrame = requestAnimationFrame(monitorSilence);
}

function stopRecording() {
  if (animFrame) cancelAnimationFrame(animFrame);
  if (mediaRecorder && mediaRecorder.state !== "inactive") {
    mediaRecorder.stop();
  }
  if (stream) stream.getTracks().forEach((t) => t.stop());
  if (audioContext) audioContext.close();
  setState("processing");
}

function onRecordingStop() {
  const blob = new Blob(audioChunks, { type: "audio/webm" });
  const reader = new FileReader();
  reader.onloadend = () => {
    const base64 = reader.result.split(",")[1];
    setComponentValue({ audio_base64: base64, ts: Date.now() });
    setTimeout(() => setState("idle"), 400);
  };
  reader.readAsDataURL(blob);
}

micBtn.addEventListener("click", () => {
  if (wrap.className.includes("idle")) {
    startRecording();
  }
});
</script>
</body>
</html>
